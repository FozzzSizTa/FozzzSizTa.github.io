<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>張萁元 | 履歷</title>
    <meta name="description" content="張萁元的履歷頁面。" />
    <style>
      :root {
        --bg: #f6f1e8;
        --surface: rgba(255, 255, 255, 0.82);
        --text: #1b2430;
        --muted: #66707c;
        --accent: #b58a3c;
        --line: rgba(27, 36, 48, 0.12);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #eef2f6 0%, var(--bg) 100%);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 1.6rem;
        box-shadow: 0 20px 50px rgba(27, 36, 48, 0.12);
        backdrop-filter: blur(12px);
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.4rem;
      }
      a.back {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        text-decoration: none;
        color: var(--text);
        padding: 0.85rem 1.1rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.68);
      }
      a.back:hover { background: #fff; }
      h1 { margin: 0; font-size: clamp(2rem, 3vw, 3rem); }
      .lead { margin: 0.55rem 0 0; color: var(--muted); line-height: 1.8; }
      .block {
        margin-top: 1.2rem;
        padding: 1.2rem;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid var(--line);
      }
      .block h2 { margin: 0 0 0.65rem; font-size: 1.15rem; }
      .block p { margin: 0; color: var(--muted); line-height: 1.9; }
      .pillrow { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-top: 0.9rem; }
      .pill {
        padding: 0.55rem 0.8rem;
        border-radius: 999px;
        background: rgba(181, 138, 60, 0.12);
        color: #73561f;
        border: 1px solid rgba(181, 138, 60, 0.2);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <div class="top">
          <div>
            <h1>履歷</h1>
            <p class="lead">這一頁先保留為履歷內容區，後續可放入學歷、工作經歷、技能與證照。</p>
          </div>
          <a class="back" href="index.html">回到主畫面</a>
        </div>

        <div class="block">
          <h2>目前狀態</h2>
          <p>頁面已建立，之後可以直接在這裡補上你的自我介紹、學經歷、專長與聯絡方式。</p>
          <div class="pillrow">
            <span class="pill">學歷</span>
            <span class="pill">工作經歷</span>
            <span class="pill">技能</span>
            <span class="pill">證照</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
