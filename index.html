<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>張萁元 | 主頁</title>
    <meta name="description" content="張萁元的個人履歷網站主頁。" />
    <style>
      :root {
        --bg: #f4f1ea;
        --surface: rgba(255, 255, 255, 0.78);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #18202a;
        --muted: #67717c;
        --accent: #d6b46b;
        --accent-dark: #8b6c2e;
        --line: rgba(24, 32, 42, 0.12);
        --shadow: 0 24px 70px rgba(24, 32, 42, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 15%, rgba(255, 255, 255, 0.92) 0, rgba(255, 255, 255, 0) 34%),
          radial-gradient(circle at 82% 16%, rgba(214, 180, 107, 0.25) 0, rgba(214, 180, 107, 0) 24%),
          linear-gradient(135deg, #eef2f6 0%, var(--bg) 54%, #e7e0d2 100%);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.74);
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0.9rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .socials {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      .socials a {
        width: 2rem;
        height: 2rem;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        color: #111827;
        text-decoration: none;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      }

      .socials a:hover {
        transform: translateY(-1px);
        background: rgba(214, 180, 107, 0.18);
        color: var(--accent-dark);
      }

      .socials svg {
        width: 1rem;
        height: 1rem;
        fill: currentColor;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 1.6rem;
      }

      .nav a {
        text-decoration: none;
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.02em;
        transition: color 0.2s ease;
      }

      .nav a.active,
      .nav a:hover {
        color: var(--text);
      }

      .hero {
        max-width: 1180px;
        min-height: calc(100vh - 76px);
        margin: 0 auto;
        padding: 4rem 1.25rem 2.5rem;
        display: grid;
        align-items: center;
      }

      .hero-card {
        position: relative;
        overflow: hidden;
        min-height: 680px;
        border-radius: 32px;
        box-shadow: var(--shadow);
        background:
          linear-gradient(90deg, rgba(17, 24, 39, 0.6) 0%, rgba(17, 24, 39, 0.18) 38%, rgba(17, 24, 39, 0.08) 100%),
          radial-gradient(circle at 25% 40%, rgba(255, 255, 255, 0.24) 0, rgba(255, 255, 255, 0) 24%),
          linear-gradient(120deg, #9da4aa 0%, #d8d4cf 42%, #a19b93 100%);
      }

      .hero-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 72% 32%, rgba(255, 230, 190, 0.15) 0, rgba(255, 230, 190, 0) 22%),
          radial-gradient(circle at 18% 62%, rgba(255, 255, 255, 0.18) 0, rgba(255, 255, 255, 0) 28%);
        pointer-events: none;
      }

      .hero-copy {
        position: relative;
        z-index: 1;
        max-width: 640px;
        height: 100%;
        padding: 7.5rem 4rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 1rem;
        font-size: 0.95rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.74);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 6vw, 5.6rem);
        line-height: 0.95;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-wrap: balance;
      }

      .dot {
        color: #2dd4bf;
      }

      .subtitle {
        margin: 1rem 0 0;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.86);
      }

      .summary {
        margin: 1.75rem 0 0;
        max-width: 34rem;
        font-size: 1rem;
        line-height: 1.9;
        color: rgba(255, 255, 255, 0.82);
      }

      .actions {
        margin-top: 2.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        min-width: 11.5rem;
        padding: 0.95rem 1.2rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 0.04em;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .button.primary {
        background: var(--surface-strong);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.84);
      }

      .button.secondary {
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.38);
        background: rgba(255, 255, 255, 0.08);
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .page-links {
        margin-top: 3rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .page-links a {
        padding: 1rem 1.1rem;
        border-radius: 18px;
        text-decoration: none;
        color: var(--text);
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.76);
        box-shadow: 0 12px 28px rgba(24, 32, 42, 0.08);
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .page-links a:hover {
        transform: translateY(-2px);
        background: #fff;
      }

      .page-links strong {
        display: block;
        margin-bottom: 0.4rem;
      }

      .note {
        position: absolute;
        right: 1.6rem;
        bottom: 1.6rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.86);
        background: rgba(17, 24, 39, 0.28);
        backdrop-filter: blur(10px);
        font-size: 0.92rem;
      }

      @media (max-width: 900px) {
        .topbar-inner {
          flex-direction: column;
        }

        .hero {
          min-height: auto;
          padding-top: 1.25rem;
        }

        .hero-card {
          min-height: 720px;
        }

        .hero-copy {
          padding: 6rem 1.5rem 5.5rem;
        }

        .page-links {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .hero-card {
          border-radius: 24px;
        }

        .hero-copy {
          padding: 5rem 1.2rem 5rem;
        }

        h1 {
          letter-spacing: 0.12em;
        }

        .note {
          left: 1.2rem;
          right: 1.2rem;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">

        <nav class="nav" aria-label="主導覽">
          <a class="active" href="index.html">Home</a>
          <a href="resume.html">Resume</a>
          <a href="portfolio.html">Portfolio</a>
        </nav>
      </div>
    </header>

    <main class="hero">
      <section class="hero-card" aria-label="主畫面介紹">
        <div class="hero-copy">
          <p class="eyebrow">Personal Portfolio</p>
          <h1>張萁元<span class="dot">.</span></h1>
          <p class="subtitle">履歷網站建設中</p>
          <p class="summary">這裡將會是你的個人主頁、履歷與作品集入口。主畫面先依照你提供的視覺方向建立，後續可以再放入個人照片、自我介紹與精選作品。</p>

          <div class="actions">
            <a class="button primary" href="resume.html">前往履歷</a>
            <a class="button secondary" href="portfolio.html">查看作品集</a>
          </div>

          <div class="page-links" aria-label="頁面捷徑">
            <a href="resume.html">
              <strong>履歷</strong>
              先放入學經歷、技能與工作內容。
            </a>
            <a href="portfolio.html">
              <strong>作品集</strong>
              之後可展示專案、設計或其他成果。
            </a>
          </div>
        </div>

        <div class="note">首頁版型已建立，後續可直接換照片與文字。</div>
      </section>

  </body>
