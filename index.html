<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>張萁元履歷建設中</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --panel: rgba(255, 255, 255, 0.72);
        --text: #1f2937;
        --accent: #b45309;
        --shadow: 0 24px 60px rgba(31, 41, 55, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, #fff7ed 0%, transparent 38%),
          linear-gradient(135deg, #f8fafc 0%, var(--bg) 100%);
      }

      main {
        width: min(92vw, 760px);
        padding: 3rem 2rem;
        text-align: center;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.75rem);
        line-height: 1.15;
        letter-spacing: 0.04em;
        color: var(--accent);
      }

      p {
        margin: 1rem 0 0;
        font-size: 1.05rem;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>張萁元履歷建設中</h1>
      <p>網站正在準備中，敬請期待。</p>
    </main>
  </body>
</html>
