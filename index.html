<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>張萁元｜主頁</title>
    <meta name="description" content="張萁元的個人履歷網站主頁" />
    <style>
      :root {
        color-scheme: light;
        --bg: #eef1f5;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.9);
        --text: #172033;
        --muted: #667085;
        --accent: #0ea5e9;
        --accent-dark: #0284c7;
        --line: rgba(23, 32, 51, 0.12);
        --shadow: 0 30px 80px rgba(15, 23, 42, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 28%),
          radial-gradient(circle at right center, rgba(15, 23, 42, 0.08), transparent 22%),
          linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(24px);
          filter: blur(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      .animate {
        opacity: 0;
        animation: riseIn 0.85s cubic-bezier(0.12, 0.88, 0.22, 1) both;
      }

      .delay-1 { animation-delay: 0.08s; }
      .delay-2 { animation-delay: 0.18s; }
      .delay-3 { animation-delay: 0.28s; }
      .delay-4 { animation-delay: 0.38s; }
      .delay-5 { animation-delay: 0.48s; }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.05rem clamp(1.1rem, 3vw, 2.5rem);
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(16px);
      }

      .socials {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .social-link {
        width: 2.2rem;
        height: 2.2rem;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(23, 32, 51, 0.08);
        transition: transform 180ms ease, color 180ms ease, border-color 180ms ease;
      }

      .social-link:hover {
        transform: translateY(-2px);
        color: var(--accent-dark);
        border-color: rgba(14, 165, 233, 0.3);
      }

      .social-link svg {
        width: 1rem;
        height: 1rem;
        fill: currentColor;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 1.5rem;
        font-size: 0.95rem;
      }

      .nav a {
        color: var(--muted);
        position: relative;
        padding-bottom: 0.15rem;
      }

      .nav a:hover,
      .nav a[aria-current="page"] {
        color: var(--text);
      }

      .nav a[aria-current="page"]::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -0.25rem;
        height: 2px;
        border-radius: 999px;
        background: var(--accent);
      }

      .hero {
        position: relative;
        flex: 1;
        display: grid;
        align-items: stretch;
        overflow: hidden;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(16px);
        pointer-events: none;
      }

      .hero::before {
        width: 22rem;
        height: 22rem;
        right: -6rem;
        top: 3rem;
        background: radial-gradient(circle, rgba(15, 23, 42, 0.18), transparent 65%);
      }

      .hero::after {
        width: 18rem;
        height: 18rem;
        left: -5rem;
        bottom: -4rem;
        background: radial-gradient(circle, rgba(14, 165, 233, 0.2), transparent 65%);
      }

      .hero-inner {
        position: relative;
        z-index: 1;
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: clamp(2rem, 5vw, 4rem) clamp(1.1rem, 4vw, 2.5rem) 2.5rem;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: clamp(1.5rem, 4vw, 4rem);
        align-items: center;
        min-height: calc(100vh - 5.2rem);
      }

      .hero-card {
        position: relative;
      }

      .hero-copy {
        max-width: 34rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      .eyebrow::before {
        content: "";
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: var(--accent);
      }

      h1 {
        margin: 1.2rem 0 0;
        font-size: clamp(3rem, 8vw, 6rem);
        line-height: 0.92;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 span {
        display: block;
        margin-top: 1rem;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        letter-spacing: 0.04em;
        text-transform: none;
        color: var(--muted);
      }

      .intro {
        margin: 1.5rem 0 0;
        max-width: 32rem;
        font-size: 1.04rem;
        line-height: 1.9;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-top: 2rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.1rem;
        padding: 0.7rem 1.25rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-weight: 600;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button.primary {
        background: var(--text);
        color: #fff;
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.72);
        border-color: var(--line);
        color: var(--text);
      }

      .portrait {
        position: relative;
        min-height: 42rem;
        border-radius: 36px;
        background:
          radial-gradient(circle at 40% 25%, rgba(255, 255, 255, 0.9), transparent 18%),
          radial-gradient(circle at 58% 50%, rgba(255, 255, 255, 0.16), transparent 21%),
          linear-gradient(145deg, rgba(15, 23, 42, 0.1), rgba(255, 255, 255, 0.48)),
          linear-gradient(160deg, #aeb8c5 0%, #7f8aa0 38%, #48556c 100%);
        box-shadow: var(--shadow);
        overflow: hidden;
        isolation: isolate;
      }

      .portrait::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 42%;
        background: linear-gradient(180deg, transparent 0%, rgba(17, 24, 39, 0.18) 55%, rgba(17, 24, 39, 0.42) 100%);
      }

      .portrait-frame {
        position: absolute;
        inset: 1rem;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .portrait::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 52% 36%, rgba(255, 243, 230, 0.45), transparent 11%),
          radial-gradient(circle at 50% 48%, rgba(255, 210, 180, 0.9), transparent 13%),
          radial-gradient(circle at 50% 58%, rgba(35, 28, 25, 0.9), transparent 8%),
          radial-gradient(circle at 51% 62%, rgba(255, 255, 255, 0.96), transparent 22%),
          radial-gradient(circle at 50% 66%, rgba(12, 12, 14, 0.85), transparent 6%),
          radial-gradient(circle at 62% 54%, rgba(255, 255, 255, 0.95), transparent 9%),
          radial-gradient(circle at 38% 54%, rgba(255, 255, 255, 0.95), transparent 9%),
          radial-gradient(circle at 50% 78%, rgba(255, 255, 255, 0.12), transparent 22%);
        opacity: 0.95;
        mix-blend-mode: screen;
      }

      .portrait-badge {
        position: absolute;
        left: 1.5rem;
        bottom: 1.5rem;
        z-index: 1;
        padding: 0.85rem 1rem;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(10px);
      }

      .portrait-badge strong {
        display: block;
        font-size: 1rem;
      }

      .portrait-badge span {
        display: block;
        margin-top: 0.3rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 920px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .nav {
          justify-content: flex-start;
        }

        .hero-inner {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .portrait {
          min-height: 24rem;
        }
      }

      @media (max-width: 540px) {
        .nav {
          gap: 1rem;
          font-size: 0.92rem;
        }

        h1 {
          letter-spacing: 0.08em;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>

          <div class="portrait animate delay-3 hero-card" aria-label="主頁視覺區塊">

            <div class="portrait-badge animate delay-5">

      </main>
    </div>
  </body>
